<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">  
</head>
<body>
    <div class="container">
        <div class="stopwatch">
            <h1 id="time">00:00:00</h1>
            <div class="button">
                <img src="images\stop.png" id="stop" onclick= stopwatch()>
                <img src="images\start.png" id="start" onclick=startwatch()>
                <img src="images\reset.png" id="reset" onclick=resetwatch()>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
